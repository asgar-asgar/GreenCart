<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenCart - Farm Fresh</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="auth-box">

        <!-- Logo -->
        <div class="logo">
            <span class="logo-icon">🌿</span>
            <h1>GreenCart</h1>
            <p>Farm Fresh Marketplace</p>
        </div>

        <!-- Tabs -->
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="showTab('login')">Login</button>
            <button class="tab-btn" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginTab" class="tab-content">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>
            <div id="loginError" class="error-msg"></div>
            <button class="btn-primary" onclick="login()">Login</button>
        </div>

        <!-- Register Form -->
        <!-- Register Form -->
        <div id="registerTab" class="tab-content hidden">
            <div class="form-group">
                <label>Register As</label>
                <select id="regRole">
                    <option value="CONSUMER">Consumer</option>
                    <option value="FARMER">Farmer</option>
                </select>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Create password">
            </div>
            <div class="form-group">
                <label>Mobile</label>
                <input type="text" id="regMobile" placeholder="Enter mobile number">
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" id="regAddress" placeholder="Enter your address">
            </div>
            <div id="registerError" class="error-msg"></div>
            <div id="registerSuccess" class="success-msg"></div>
            <button class="btn-primary" onclick="register()">Register</button>
        </div>

    </div>
</div>

<script src="/js/auth.js"></script>
</body>
</html>
