<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Dashboard - GreenCart</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/farmer.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="nav-brand">
        <span>🌿</span>
        <span>GreenCart</span>
    </div>
    <div class="nav-right">
        <span id="farmerEmail"></span>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</nav>

<!-- Tab Navigation -->
<div class="tab-nav">
    <button class="tab-nav-btn active" onclick="showSection('products')">My Products</button>
    <button class="tab-nav-btn" onclick="showSection('addProduct')">Add Product</button>
    <button class="tab-nav-btn" onclick="showSection('orders')">
        Incoming Orders <span id="orderBadge" class="badge hidden">0</span>
    </button>
    <button class="tab-nav-btn" onclick="showSection('profile')">Profile</button>
</div>

<!-- Main Content -->
<div class="main-content">

    <!-- My Products Section -->
    <div id="productsSection" class="section">
        <h2>My Products</h2>
        <div id="productsList" class="products-grid"></div>
    </div>

    <!-- Add Product Section -->
    <div id="addProductSection" class="section hidden">
        <h2>Add New Product</h2>
        <div class="form-card">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="prodName" placeholder="e.g. Fresh Tomatoes">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="prodCategory">
                    <option value="Vegetables">Vegetables</option>
                    <option value="Fruits">Fruits</option>
                    <option value="Grains">Grains</option>
                    <option value="Dairy">Dairy</option>
                    <option value="Spices">Spices</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Price (₹/kg)</label>
                    <input type="number" id="prodPrice" placeholder="e.g. 40">
                </div>
                <div class="form-group">
                    <label>Quantity (kg)</label>
                    <input type="number" id="prodQuantity" placeholder="e.g. 100">
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="prodDescription" placeholder="Describe your product..."></textarea>
            </div>
            <div class="form-group">
                <label>Product Image</label>
                <input type="file" id="prodImage" accept="image/*">
            </div>
            <div class="form-group">
                <label>Availability</label>
                <select id="prodAvailability">
                    <option value="true">Available</option>
                    <option value="false">Not Available</option>
                </select>
            </div>
            <div id="addProductError" class="error-msg"></div>
            <div id="addProductSuccess" class="success-msg"></div>
            <button class="btn-primary" onclick="addProduct()">Add Product</button>
        </div>
    </div>

    <!-- Incoming Orders Section -->
    <div id="ordersSection" class="section hidden">
        <h2>Incoming Orders</h2>
        <div id="ordersList"></div>
    </div>

    <!-- Profile Section -->
    <div id="profileSection" class="section hidden">
        <h2>Profile</h2>
        <div class="profile-card">
            <div class="profile-row">
                <span class="profile-label">Name</span>
                <span id="profileName"></span>
            </div>
            <div class="profile-row">
                <span class="profile-label">Email</span>
                <span id="profileEmail"></span>
            </div>
            <div class="profile-row">
                <span class="profile-label">Mobile</span>
                <span id="profileMobile"></span>
            </div>
            <div class="profile-row">
                <span class="profile-label">Address</span>
                <span id="profileAddress"></span>
            </div>
            <div class="profile-row">
                <span class="profile-label">Role</span>
                <span class="role-badge">FARMER</span>
            </div>
        </div>
    </div>

</div>

<script src="/js/farmer.js"></script>
</body>
</html>
