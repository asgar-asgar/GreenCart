<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumer Marketplace - GreenCart</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/consumer.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="nav-brand">
        <span>🌿</span>
        <span>Consumer Marketplace</span>
    </div>
    <div class="nav-right">
        <button class="btn-cart" onclick="showSection('cart')">
            🛒 Cart <span id="cartCount" class="badge">0</span>
        </button>
        <span id="consumerEmail"></span>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</nav>

<!-- Tab Navigation -->
<div class="tab-nav">
    <button class="tab-nav-btn active" onclick="showSection('marketplace')">Marketplace</button>
    <button class="tab-nav-btn" onclick="showSection('cart')">Cart</button>
    <button class="tab-nav-btn" onclick="showSection('orders')">My Orders</button>
    <button class="tab-nav-btn" onclick="showSection('profile')">Profile</button>
</div>

<!-- Main Content -->
<div class="main-content">

    <!-- Marketplace Section -->
    <div id="marketplaceSection" class="section">
        <div class="section-header">
            <h2>Browse Products</h2>
            <div class="filter-group">
                <label>Category:</label>
                <select id="categoryFilter" onchange="filterProducts()">
                    <option value="All">All</option>
                    <option value="Vegetables">Vegetables</option>
                    <option value="Fruits">Fruits</option>
                    <option value="Grains">Grains</option>
                    <option value="Dairy">Dairy</option>
                    <option value="Spices">Spices</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>
        <div id="productsList" class="products-grid"></div>
    </div>

    <!-- Cart Section -->
    <div id="cartSection" class="section hidden">
        <h2>Your Cart</h2>
        <div id="cartItems"></div>
        <div id="cartSummary" class="hidden">
            <div class="cart-total">
                Total: ₹<span id="cartTotal">0</span>
            </div>
            <div class="form-group">
                <label>Delivery Address</label>
                <input type="text" id="deliveryAddress" placeholder="Enter delivery address">
            </div>
            <div id="orderError" class="error-msg"></div>
            <div id="orderSuccess" class="success-msg"></div>
            <button class="btn-primary" onclick="placeOrder()">Buy Now (Cash on Delivery)</button>
        </div>
    </div>

    <!-- My Orders Section -->
    <div id="ordersSection" class="section hidden">
        <h2>My Orders</h2>
        <div id="ordersList"></div>
    </div>

    <!-- Profile Section -->
    <div id="profileSection" class="section hidden">
        <h2>Profile</h2>
        <div class="profile-card">
            <div class="profile-row">
                <span class="profile-label">Name</span>
                <span id="profileName"></span>
            </div>
            <div class="profile-row">
                <span class="profile-label">Email</span>
                <span id="profileEmail"></span>
            </div>
            <div class="profile-row">
                <span class="profile-label">Mobile</span>
                <span id="profileMobile"></span>
            </div>
            <div class="profile-row">
                <span class="profile-label">Address</span>
                <span id="profileAddress"></span>
            </div>
            <div class="profile-row">
                <span class="profile-label">Role</span>
                <span class="role-badge">CONSUMER</span>
            </div>
        </div>
    </div>

</div>

<script src="/js/consumer.js"></script>
</body>
</html>
